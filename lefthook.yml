# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      glob: "**/*.{js,jsx,ts,tsx}"
      exclude:
        - "src/app/(payload)/**"
        - "src/payload/payload-types.ts"
        - "src/payload/migrations/**"
      run: yarn exec oxlint {staged_files} --fix
      stage_fixed: true
    - name: oxfmt
      exclude:
        - "src/app/(payload)/**"
        - "src/payload/payload-types.ts"
        - "src/payload/migrations/**"
      run: yarn exec oxfmt {staged_files} --no-error-on-unmatched-pattern
      stage_fixed: true
