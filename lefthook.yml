# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      glob: "**/*.{js,jsx,ts,tsx}"
      run: yarn exec oxlint {staged_files} --fix
      stage_fixed: true
    - name: oxfmt
      run: yarn exec oxfmt {staged_files} --no-error-on-unmatched-pattern
      stage_fixed: true
